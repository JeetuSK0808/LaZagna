# ============================================================
# LaZagna Setup — SB Pattern Test
# ============================================================
# Tests different custom switch-block turn patterns.
# Each pattern defines input/output turn offsets [N, E, S, W].
# Patterns are swept as linked parameters (each pair tested
# independently, not as a Cartesian product).
# ============================================================

experiment_name: "sb_pattern_test"

switch_block_3d:
  connection_type: ["custom"]
  custom_patterns:
    - input:  [0, 0, 0, 0]     # subset
      output: [0, 0, 0, 0]
    - input:  [0, 1, 2, 3]     # wilton variant 1
      output: [0, 1, 2, 3]
    - input:  [0, 0, 0, 0]     # wilton variant 2
      output: [0, 1, 2, 3]
    - input:  [0, 0, 0, 0]     # offset
      output: [1, 1, 1, 1]
