# ============================================================
# LaZagna Setup — Verilog Benchmark Test
# ============================================================
# Runs Verilog (Koios/ITD) benchmarks on a larger grid.
# ============================================================

experiment_name: "verilog_benchmarks_test"

grid:
  width_3d: 100
  height_3d: 100
  width_2d: 144
  height_2d: 144
  channel_width: 300

benchmarks:
  directory: "{lazagna_root}/benchmarks/ITD_quick"
  is_verilog: true
